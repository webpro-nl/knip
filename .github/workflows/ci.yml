name: Tests (against typescript@next in Node.js v24)

on:
  workflow_dispatch:
  pull_request:
  push:
    branches:
      - '**'
    tags:
      - '!**'

# Automatically cancel in-progress actions on the same branch
concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

permissions: {}

jobs:
  changes:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: read
    outputs:
      relevant: ${{ steps.filter.outputs.relevant || 'true' }}
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
        with:
          fetch-depth: 2
      - uses: dorny/paths-filter@7b450fff21473bca461d4b92ce414b9d0420d706 # v4.0.2
        id: filter
        if: github.event_name != 'workflow_dispatch'
        with:
          filters: |
            relevant:
              # All package sources (knip lints across the monorepo and analyzes the repo itself)
              - 'packages/**'
              - '!packages/docs/**/*.md'
              - '!packages/docs/**/*.mdx'
              # Root workspace / dependency / lint / knip-on-self config
              - 'package.json'
              - 'pnpm-lock.yaml'
              - 'pnpm-workspace.yaml'
              - '.oxlintrc.json'
              - '.oxfmtrc.json'
              - 'knip.json'
              # This workflow file
              - '.github/workflows/ci.yml'

  test:
    needs: changes
    if: needs.changes.outputs.relevant == 'true'
    runs-on: ubuntu-latest
    name: Ubuntu/Node v24
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
        with:
          node-version: 24
      - uses: pnpm/action-setup@fc06bc1257f339d1d5d8b3a19a8cae5388b55320 # v5
      - name: Install dependencies
        run: pnpm install
      - name: Install latest peer dependencies
        run: pnpm add typescript@next @types/node@24 --config.trustPolicy=allow
        working-directory: packages/knip
      - name: Lint knip
        run: pnpm run ci
      - name: Build knip
        run: pnpm run build
        working-directory: packages/knip
      - name: Test knip
        run: pnpm test --runtime node
        working-directory: packages/knip
      - name: Run knip
        run: ./packages/knip/bin/knip.js
      - name: Run knip in strict mode
        run: ./packages/knip/bin/knip.js --production --strict
